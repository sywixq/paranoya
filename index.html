<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rex Loader</title>
  <style>
    :root {
      --lc1: #ff2a2a;
      --lc2: #b30000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    @keyframes gs-fade-in {
      0% { opacity: 0; transform: scale(0.96); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes gs-fade-out {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.04); }
    }

    @keyframes gs-bar {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes gs-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    #gs-loader {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
      background: radial-gradient(ellipse at 50% 40%, #171717 0%, #050505 100%);
      animation: gs-fade-in 0.4s ease both;
    }

    #gs-loader.gs-hiding {
      animation: gs-fade-out 2s ease forwards;
    }

    #gs-loader-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 3px;
      color: #fff;
      text-transform: uppercase;
      margin-top: 0;
      text-shadow: 0 0 40px rgba(255, 42, 42, 0.8);
    }

    #gs-loader-title span {
      background: linear-gradient(135deg, var(--lc1), var(--lc2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #gs-loader-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 2px;
      margin-top: 6px;
      animation: gs-pulse 2s ease-in-out infinite;
    }

    #gs-loader-percent {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.75);
      font-weight: 700;
    }

    #gs-loader-bar-wrap {
      width: 200px;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      margin-top: 32px;
      overflow: hidden;
    }

    #gs-loader-bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--lc1), var(--lc2));
      border-radius: 2px;
      box-shadow: 0 0 10px rgba(255, 42, 42, 0.8);
      transition: width 0.3s ease-out;
    }

    #gs-loader-dots {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    #gs-loader-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--lc1);
      animation: gs-pulse 1.2s ease-in-out infinite;
    }

    #gs-loader-dots span:nth-child(2) {
      animation-delay: .2s;
      background: rgba(255, 42, 42, 0.7);
    }

    #gs-loader-dots span:nth-child(3) {
      animation-delay: .4s;
      background: rgba(255, 42, 42, 0.4);
    }
  </style>
</head>
<body>
  <div id="gs-loader" aria-label="Loading">
    <div id="gs-loader-title">Rex<span>.lua</span></div>
    <div id="gs-loader-sub">Loading</div>
    <div id="gs-loader-percent">0%</div>
    <div id="gs-loader-bar-wrap"><div id="gs-loader-bar"></div></div>
    <div id="gs-loader-dots"><span></span><span></span><span></span></div>
  </div>

  <script>
    (function () {
      var loader = document.getElementById("gs-loader");
      var bar = document.getElementById("gs-loader-bar");
      var sub = document.getElementById("gs-loader-sub");
      var percent = document.getElementById("gs-loader-percent");
      if (!loader || !bar || !sub || !percent) return;

      var p = 0;
      var interval = setInterval(function () {
        p += Math.random() * 15 + 5;
        if (p >= 100) {
          p = 100;
        }

        bar.style.width = p + "%";
        percent.textContent = Math.round(p) + "%";
        if (p < 100) {
          sub.textContent = "Loading";
          return;
        }

        sub.textContent = "Successfully Injected";
        clearInterval(interval);

        setTimeout(function () {
          loader.classList.add("gs-hiding");
          setTimeout(function () {
            loader.remove();
          }, 2000);
        }, 900);
      }, 200);
    })();
  </script>
</body>
</html>
